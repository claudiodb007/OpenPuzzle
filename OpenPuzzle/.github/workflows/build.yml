name: Build and Smoke Test

on:
  push:
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake libsqlite3-dev libboost-all-dev

      - name: Smoke test
        run: ./scripts/smoke_test.sh
